<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoostHub</title>
  <meta name="description" content="Open BoostHub to view shared car builds, events, profiles, and marketplace links.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BoostHub">
  <meta property="og:title" content="BoostHub">
  <meta property="og:description" content="Open BoostHub to view shared car builds, events, profiles, and marketplace links.">
  <meta property="og:image" content="https://boosthubapp.com/og/boosthub-og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BoostHub">
  <meta name="twitter:description" content="Open BoostHub to view shared car builds, events, profiles, and marketplace links.">
  <meta name="twitter:image" content="https://boosthubapp.com/og/boosthub-og.png">
  <meta name="apple-itunes-app" content="app-id=6761749887">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #080a0d;
      color: #f8fafc;
      font-family: Arial, sans-serif;
    }
    main {
      width: min(560px, 100%);
      border: 1px solid #243041;
      border-radius: 16px;
      background: #111827;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .38);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { color: #cbd5e1; line-height: 1.5; }
    a {
      display: inline-flex;
      margin: 12px 8px 0 0;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 800;
      padding: 12px 16px;
      border-radius: 10px;
    }
    a.secondary { background: #1f2937; color: #dbeafe; }
  </style>
</head>
<body>
  <main>
    <h1>Open BoostHub</h1>
    <p>This shared BoostHub link should open in the app. If it does not, use one of the links below.</p>
    <a id="open-app" href="boosthub://">Open BoostHub</a>
    <a class="secondary" href="https://apps.apple.com/us/app/boosthub/id6761749887">App Store</a>
    <a class="secondary" href="https://play.google.com/store/apps/details?id=com.boosthubllc.app">Google Play</a>
  </main>
  <script>
    (function () {
      var path = window.location.pathname || "";
      var match = path.match(/^\/(build|events|marketplace|u)\/([^/?#]+)/);
      var deepLink = "boosthub://";
      var shouldAutoOpen = false;
      var shareFunctionBaseUrl = "https://nnuhkqtsrrxubmsoqehr.supabase.co/functions/v1";

      function renderSharePreview(kind, id) {
        var functionName = kind === "u" ? "share-profile" : kind === "build" ? "share-build" : "";
        if (!functionName || !id) return false;

        fetch(shareFunctionBaseUrl + "/" + functionName + "/" + encodeURIComponent(id))
          .then(function (response) {
            if (!response.ok) throw new Error("Share preview failed");
            return response.text();
          })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
          })
          .catch(function () {
            document.body.classList.add("fallback-ready");
          });

        return true;
      }

      if (match) {
        var kind = match[1];
        var id = decodeURIComponent(match[2]);
        deepLink = "boosthub://" + kind + "/" + encodeURIComponent(id);

        if (renderSharePreview(kind, id)) {
          document.getElementById("open-app").href = deepLink;
          return;
        }

        shouldAutoOpen = kind !== "u";
      } else if (path === "/merch") {
        deepLink = "boosthub://merch";
        shouldAutoOpen = true;
      }

      document.getElementById("open-app").href = deepLink;

      if (shouldAutoOpen && deepLink !== "boosthub://") {
        setTimeout(function () {
          window.location.href = deepLink;
        }, 400);
      }
    })();
  </script>
</body>
</html>
